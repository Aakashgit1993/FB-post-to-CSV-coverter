<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Post → CSV Builder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #111; min-height: 100vh; }
  .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* Header */
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; }
  .header-text h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .header-text p { font-size: 13px; color: #6b7280; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px 16px; }
  .stat-label { font-size: 12px; color: #6b7280; margin-bottom: 4px; }
  .stat-val { font-size: 24px; font-weight: 600; color: #111; }

  /* Input */
  textarea {
    width: 100%; height: 160px; padding: 14px; font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace; border: 1.5px solid #d1d5db;
    border-radius: 10px; background: #fff; color: #111; resize: vertical;
    outline: none; transition: border-color 0.15s;
  }
  textarea:focus { border-color: #6366f1; }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; margin: 10px 0 1rem; }
  .btn { padding: 10px 18px; font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer; border: 1.5px solid #d1d5db; background: #fff; color: #111; transition: all 0.15s; }
  .btn:hover { background: #f3f4f6; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { flex: 1; background: #6366f1; color: #fff; border-color: #6366f1; }
  .btn-primary:hover { background: #4f46e5; border-color: #4f46e5; }
  .btn-danger { color: #dc2626; border-color: #fca5a5; }
  .btn-danger:hover { background: #fef2f2; }

  /* Status */
  .status { display: none; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }
  .status.ok { display: block; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  .status.err { display: block; background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
  .status.info { display: block; background: #f8fafc; color: #475569; border: 1px solid #e2e8f0; }

  /* Preview */
  .preview-header { display: flex; align-items: center; justify-content: space-between; margin: 1.5rem 0 10px; }
  .preview-header h2 { font-size: 15px; font-weight: 600; }
  .preview-note { font-size: 12px; color: #9ca3af; }
  .table-wrap { overflow-x: auto; border: 1px solid #e5e7eb; border-radius: 10px; background: #fff; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; min-width: 900px; }
  thead tr { background: #f9fafb; }
  th { padding: 9px 12px; text-align: left; font-weight: 500; color: #6b7280; border-bottom: 1px solid #e5e7eb; white-space: nowrap; }
  td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; color: #111; vertical-align: top; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) { background: #fafafa; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
  .badge-post { background: #ede9fe; color: #5b21b6; }
  .badge-comment { background: #f3f4f6; color: #6b7280; }
  td.wrap { white-space: normal; line-height: 1.4; font-size: 11px; }
  a { color: #6366f1; text-decoration: none; font-size: 11px; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-text">
      <h1>FB Post → CSV Builder</h1>
      <p>Paste raw Facebook copy with embedded URLs &bull; AI extracts all fields &bull; de-dupes &bull; download CSV</p>
    </div>
    <button class="btn btn-danger" onclick="clearAll()">Clear all</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total rows</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">This session</div><div class="stat-val" id="s-added">0</div></div>
    <div class="stat"><div class="stat-label">Dupes skipped</div><div class="stat-val" id="s-dupes">0</div></div>
  </div>

  <textarea id="paste-box" placeholder="Paste raw Facebook copy here — including lines like:
[Chris Garza](https://www.facebook.com/groups/.../user/100006600690915/?...)
[timestamp](https://www.facebook.com/groups/.../posts/123456/)
Post content text goes here..."></textarea>

  <div class="btn-row">
    <button class="btn btn-primary" id="parse-btn" onclick="runParse()">Parse &amp; add to CSV</button>
    <button class="btn" onclick="downloadCSV()">Download CSV</button>
  </div>

  <div class="status" id="status-bar"></div>

  <div id="preview-section" style="display:none">
    <div class="preview-header">
      <h2>Preview</h2>
      <span class="preview-note" id="preview-note"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:65px">Type</th>
          <th style="width:90px">Date</th>
          <th style="width:120px">Author name</th>
          <th style="width:150px">Author Profile URL</th>
          <th style="width:200px">Content</th>
          <th style="width:130px">Post Link</th>
          <th style="width:195px">AI Summary Notes</th>
        </tr></thead>
        <tbody id="preview-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const COLS = ['Type','Date','Author name','Author Profile URL','Content','Post Link','AI Summary Notes'];
let rows = [], sessionAdded = 0, sessionDupes = 0;

function dedupeKey(r) { return (r['Author name'] + '|||' + r['Content']).toLowerCase().trim(); }

function setStatus(msg, type) {
  const el = document.getElementById('status-bar');
  el.className = 'status ' + type;
  el.textContent = msg;
}

function updateStats() {
  document.getElementById('s-total').textContent = rows.length;
  document.getElementById('s-added').textContent = sessionAdded;
  document.getElementById('s-dupes').textContent = sessionDupes;
}

function renderPreview() {
  const tbody = document.getElementById('preview-body');
  tbody.innerHTML = '';
  const show = rows.slice(-15);
  show.forEach(r => {
    const tr = document.createElement('tr');
    COLS.forEach(col => {
      const td = document.createElement('td');
      const val = r[col] || '';
      if (col === 'Type') {
        const b = document.createElement('span');
        b.className = 'badge ' + (val === 'POST' ? 'badge-post' : 'badge-comment');
        b.textContent = val; td.appendChild(b);
      } else if (col === 'Content' || col === 'AI Summary Notes') {
        td.className = 'wrap';
        td.textContent = val.length > 90 ? val.slice(0, 88) + '…' : val;
        td.title = val;
      } else if ((col === 'Author Profile URL' || col === 'Post Link') && val) {
        const a = document.createElement('a');
        a.href = val; a.target = '_blank'; a.rel = 'noopener';
        a.textContent = val.length > 32 ? val.slice(0, 30) + '…' : val;
        td.appendChild(a);
      } else {
        td.textContent = val.length > 28 ? val.slice(0, 26) + '…' : val;
        td.title = val;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  document.getElementById('preview-section').style.display = rows.length > 0 ? 'block' : 'none';
  document.getElementById('preview-note').textContent = rows.length > 15 ? `showing last 15 of ${rows.length}` : `${rows.length} row${rows.length !== 1 ? 's' : ''}`;
}

async function runParse() {
  const text = document.getElementById('paste-box').value.trim();
  if (!text) { setStatus('Paste some Facebook content first.', 'err'); return; }
  const btn = document.getElementById('parse-btn');
  btn.disabled = true; btn.textContent = 'Parsing…';
  setStatus('Sending to AI — extracting posts and URLs…', 'info');

  try {
    const res = await fetch('/api/parse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    if (data.error) { setStatus('Error: ' + data.error, 'err'); btn.disabled = false; btn.textContent = 'Parse & add to CSV'; return; }

    const parsed = data.posts;
    if (!Array.isArray(parsed) || parsed.length === 0) {
      setStatus('No posts detected. Include author name and post text.', 'err');
      btn.disabled = false; btn.textContent = 'Parse & add to CSV'; return;
    }

    const existingKeys = new Set(rows.map(dedupeKey));
    let added = 0, dupes = 0;
    parsed.forEach(r => {
      const norm = {}; COLS.forEach(c => norm[c] = (r[c] || '').toString().trim());
      const k = dedupeKey(norm);
      if (existingKeys.has(k)) dupes++;
      else { rows.push(norm); existingKeys.add(k); added++; }
    });

    sessionAdded += added; sessionDupes += dupes;
    updateStats(); renderPreview();
    document.getElementById('paste-box').value = '';
    setStatus(`Added ${added} new row${added !== 1 ? 's' : ''}${dupes > 0 ? ` · ${dupes} dupe${dupes !== 1 ? 's' : ''} skipped` : ''}.`, 'ok');
  } catch (err) {
    setStatus('Network error: ' + err.message, 'err');
  }
  btn.disabled = false; btn.textContent = 'Parse & add to CSV';
}

function escapeCSV(val) {
  const s = (val || '').toString();
  if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function downloadCSV() {
  if (rows.length === 0) { setStatus('No data to download yet.', 'err'); return; }
  const header = COLS.map(escapeCSV).join(',');
  const body = rows.map(r => COLS.map(c => escapeCSV(r[c])).join(',')).join('\n');
  const blob = new Blob([header + '\n' + body], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'facebook_posts.csv'; a.click();
  URL.revokeObjectURL(url);
  setStatus(`Downloaded facebook_posts.csv — ${rows.length} rows.`, 'ok');
}

function clearAll() {
  if (rows.length > 0 && !confirm('Clear all ' + rows.length + ' rows?')) return;
  rows = []; sessionAdded = 0; sessionDupes = 0;
  updateStats(); renderPreview();
  document.getElementById('status-bar').className = 'status';
  document.getElementById('paste-box').value = '';
}
</script>
</body>
</html>
